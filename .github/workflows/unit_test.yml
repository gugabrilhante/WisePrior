name: Unit Tests

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress runs for PRs (same branch, new push); never cancel master pushes
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Remove local JDK path from gradle.properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

      # ── Codecov (future) ────────────────────────────────────────────────────
      # Prerequisites before enabling:
      #   1. Enable JaCoCo in each module's build.gradle.kts:
      #        testOptions { unitTests.isIncludeAndroidResources = true }
      #        android { buildTypes { debug { enableAndroidTestCoverage = true } } }
      #   2. Add CODECOV_TOKEN to GitHub repository secrets.
      #   3. Remove `continue-on-error: true` below once the token is set.
      #
      # Codecov automatically distinguishes PR patch coverage from the full
      # baseline uploaded on push-to-master — no extra flags required.
      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/build/reports/jacoco/**/*.xml'
          fail_ci_if_error: false
