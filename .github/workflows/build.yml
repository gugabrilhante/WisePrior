name: Build

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # gradle.properties points org.gradle.java.home to a local Android Studio
      # installation that does not exist on CI runners — remove it so Gradle uses
      # the JDK configured by setup-java above.
      - name: Remove local JDK path from gradle.properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Assemble debug
        run: ./gradlew assembleDebug --stacktrace
