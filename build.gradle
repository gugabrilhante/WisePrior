plugins {
    alias(libs.plugins.android.application) apply false
    alias(libs.plugins.android.library) apply false
    alias(libs.plugins.kotlin.compose) apply false
    alias(libs.plugins.kotlin.serialization) apply false
    alias(libs.plugins.hilt.android) apply false
    alias(libs.plugins.ksp) apply false
    alias(libs.plugins.androidx.room) apply false
}

// Enable unit test coverage instrumentation in every Android module's debug build.
// This makes each module emit a .exec file when `testDebugUnitTest` runs,
// which the root-level `jacocoFullReport` task aggregates.
subprojects {
    plugins.withId('com.android.library') {
        android {
            buildTypes { debug { enableUnitTestCoverage true } }
        }
    }
    plugins.withId('com.android.application') {
        android {
            buildTypes { debug { enableUnitTestCoverage true } }
        }
    }
}

// ── JaCoCo aggregated report ──────────────────────────────────────────────────
// Run:  ./gradlew jacocoFullReport
// Output: build/reports/jacoco/jacocoFullReport/html/index.html

apply plugin: 'jacoco'

// Classes excluded from coverage: generated code, DI boilerplate, UI-only files.
def jacocoExclusions = [
    '**/R.class',
    '**/R$*.class',
    '**/BuildConfig.*',
    '**/Manifest*.*',
    '**/*Test*.*',
    'android/**/*.*',
    // Hilt generated
    '**/Hilt_*',
    '**/*_HiltModules*',
    '**/*_Factory*',
    '**/*_MembersInjector*',
    '**/DaggerHilt*',
    // Room generated
    '**/*_Impl*',
    // Compose tooling
    '**/ComposableSingletons*',
    // Navigation boilerplate
    '**/*Navigation*',
    '**/*Route*',
]

task jacocoFullReport(type: JacocoReport, group: 'verification',
        description: 'Generates aggregated JaCoCo coverage report for all modules.') {

    dependsOn subprojects.collect { proj ->
        proj.tasks.matching { it.name == 'testDebugUnitTest' }
    }

    reports {
        xml.required = true
        html.required = true
    }

    // Collect Kotlin class files from every subproject's debug compilation output
    def kotlinClassDirs = subprojects.collect { proj ->
        fileTree(
            dir: "${proj.buildDir}/tmp/kotlin-classes/debug",
            excludes: jacocoExclusions
        )
    }
    // Collect Java class files (from kapt / generated sources that use javac)
    def javaClassDirs = subprojects.collect { proj ->
        fileTree(
            dir: "${proj.buildDir}/intermediates/javac/debug/classes",
            excludes: jacocoExclusions
        )
    }

    classDirectories.setFrom(files(kotlinClassDirs + javaClassDirs))

    sourceDirectories.setFrom(files(subprojects.collect { proj ->
        ["${proj.projectDir}/src/main/java",
         "${proj.projectDir}/src/main/kotlin"]
    }.flatten()))

    // Collect .exec files generated by AGP's built-in coverage instrumentation
    executionData.setFrom(fileTree(rootDir) {
        include '**/testDebugUnitTest.exec'
        include '**/coverage.ec'
    })
}
